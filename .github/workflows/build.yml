name: Build

env:
  FORCE_COLOR: 2
  NODE: 20

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pack:
    name: Pack tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE }}
          cache: yarn
      - run: yarn install
      - run: yarn prepublishOnly
      - run: yarn pack --out svgo.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: svgo-tgz
          path: svgo.tgz
          retention-days: 1
